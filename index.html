<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <nav class="informacao">
        <div class="contato">
            <ul class="lista">
               <li><a href="https://github.com/CaioSampaiio">GitHub</a></li>
                <li><a href="https://www.linkedin.com/in/caio-sampaio-3b285320a">Linkedin</a></li>

            </ul>
        </div>
    </nav>
     <div class="title">
        <h1>Calculo de Juros %</h1>
    </div>
    <div class="calculos">
        
        <label for="valorIncio">Valor Inicial</label>
        <input type="number" id="inicial" placeholder="R$">

        <label for="valorMensal">Valor mensal</label>
        <input type="number" id="mensal" placeholder="R$">

        <label for="taxaJuros">Taxa de juros</label>
        <input type="number" id="juros" placeholder="">

        <label for="periodoMes">Periodo em</label>
        <input type="number" id="meses"placeholder="">
        
        
        <button class="submit">Calcular</button>     
    </div>
</body>
