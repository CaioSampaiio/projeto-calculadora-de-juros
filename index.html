<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <nav class="informacao">
        <div class="contato">
            <ul class="lista">
               <li><a href="https://github.com/CaioSampaiio">GitHub</a></li>
                <li><a href="https://www.linkedin.com/in/caio-sampaio-3b285320a">Linkedin</a></li>
                <li><a href="https://wa.link/al0gzs">Contato</a></li>
            </ul>
        </div>
    </nav>
     <div class="title">
        <h1>Calculo de Juros %</h1>
    </div>
    <form class="calculos">
        
        <label for="valorIncio">Valor Inicial</label>
        <input type="number" id="valor1" name="inicial" placeholder="R$">

        <label for="taxaJuros">Taxa de juros</label>
        <input type="number" id="valor2" name="juros" placeholder="%">

        <label for="periodoMes">Periodo em</label>
        <input type="number" id="valor3" name="meses" placeholder="">
        
        
        <button class="submit" type="submit" onclick="calcularJuros(event)">Calcular</button>
    </form>

    <p class="exibir" id="jurosFinal"></p>
</body>
<script src="src/index.js"></script>
</html>
